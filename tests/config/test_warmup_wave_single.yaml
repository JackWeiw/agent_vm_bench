e2b_env:
  E2B_ACCESS_TOKEN: "test_token"

sandbox:
  template: "openclaw-browser-v1"
  total_count: 50
  create_only: false
  sandbox_ids_file: "results/test/warmup_single_ids.txt"

browser:
  warmup_urls:
    - "http://example.com/page1"
    - "http://example.com/page2"
  warmup_loops: 1
  warmup_delay: 5
  warmup_only: true
  urls:
    - "http://example.com/benchmark"

test:
  duration: 60