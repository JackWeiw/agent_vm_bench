e2b_env:
  E2B_ACCESS_TOKEN: "test_token"

sandbox:
  template: "openclaw-browser-v1"
  total_count: 250
  create_only: false
  sandbox_ids_file: "results/test/warmup_multi_ids.txt"

browser:
  warmup_urls:
    - "http://example.com/warmup1"
    - "http://example.com/warmup2"
  warmup_loops: 1
  warmup_delay: 5
  warmup_only: true
  urls:
    - "http://example.com/benchmark1"
    - "http://example.com/benchmark2"

test:
  duration: 60
