# config/e2b_bench.yaml
# E2B沙箱批量性能测试配置文件示例

# E2B SDK 环境变量配置（请替换为真实凭证）
e2b_env:
  E2B_ACCESS_TOKEN: "your_e2b_access_token_here"
  E2B_API_KEY: "your_e2b_api_key_here"
  E2B_DOMAIN: "e2b.app"
  E2B_API_URL: "http://localhost:3000"
  E2B_HTTP_SSL: "false"

# 沙箱配置
sandbox:
  template: "openclaw-browser-v1"
  create_timeout: 86400
  total_count: 100

# 批量启动控制（可选，不配置则全并发）
batch:
  size: 20
  interval: 30

# 浏览器任务配置
browser:
  urls:
    - "http://192.168.110.10:8080/Weibo.html"
  task_timeout: 200
  interval_min: 0.5
  interval_max: 3.0

# 测试运行配置
test:
  duration: 600
  stats_interval: 10

# 报告配置
report:
  output_dir: "results/e2b"
  filename_prefix: "e2b_bench"