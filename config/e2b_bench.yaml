# config/e2b_bench.yaml
# E2B Sandbox Batch Performance Test Configuration Template

# E2B SDK environment variables (replace with real credentials)
e2b_env:
  E2B_ACCESS_TOKEN: "your_e2b_access_token_here"
  E2B_API_KEY: "your_e2b_api_key_here"
  E2B_DOMAIN: "e2b.app"
  E2B_API_URL: "http://localhost:3000"
  E2B_HTTP_SSL: "false"

# Sandbox configuration
sandbox:
  template: "openclaw-browser-v1"    # E2B template name (used for creation)
  create_timeout: 86400              # Sandbox creation timeout (seconds)
  total_count: 100                   # Total sandbox count (creation mode)
  detect_existing: false             # Detect existing sandboxes instead of creating new ones
  create_only: false                 # Create sandboxes only without running tasks (Phase 0)
  sandbox_ids_file: ""               # File path to save/load sandbox IDs (one ID per line, empty = disabled)

# Sandbox creation batch control (optional, full concurrent if not configured)
# Controls how many sandboxes to create per batch to avoid API/resource overload
create_batch:
  size: 20                           # Sandboxes per batch during creation
  interval: 3                       # Interval between creation batches (seconds)

# Task execution batch control (optional, full concurrent if not configured)
# Controls how many sandboxes start tasks per batch to avoid target server overload
task_batch:
  size: 10                           # Sandboxes to start tasks per batch
  interval: 5                        # Interval between task batches (seconds)

# Browser task configuration
browser:
  urls:
    - "http://192.168.110.10:8080/Weibo.html"
  task_timeout: 200
  interval_min: 5
  interval_max: 15
  # Warmup configuration (optional, run warmup pages before benchmark)
  warmup_urls:
    - "http://192.168.110.10:8080/page1.html"
    - "http://192.168.110.10:8080/page2.html"
  warmup_loops: 1            # Loop count for warmup pages
  warmup_delay: 2           # Delay between warmup pages (seconds)
  warmup_only: false         # Run warmup phase only, then exit

# Test run configuration
test:
  duration: 600
  stats_interval: 10
  benchmark_percent: 1.0    # Percentage of sandboxes for benchmark (1.0 = 100%, 0.5 = 50%)

# Report configuration
report:
  output_dir: "results/e2b"
  filename_prefix: "e2b_bench"