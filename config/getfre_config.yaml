# ========================================
# Core Frequency Collection Configuration
# ========================================
# Usage: Set GETFRE_CONFIG_PATH in .env file to this config path
# Example: GETFRE_CONFIG_PATH=config/getfre_config.yaml

# Path to getfre executable
# This can also be overridden via GETFRE_PATH in .env file
getfre_path: /path/to/getfre

# Total physical cores (must be 128 or 192)
total_cores: 192

# Sampling interval in seconds
interval: 2

# Core sampling interval
# 1 = collect all cores
# 2 = collect cores 0,2,4,6...
# 4 = collect cores 0,4,8,12...
core_interval: 1

# NUMA nodes to collect from
numa_nodes:
  - 1